<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salish Sea Dreaming — Data Map</title>
    <link rel="alternate" type="application/ld+json" href="/graph-assets/ssd-data-export.jsonld" />
    <link rel="alternate" type="text/markdown" href="/graph-assets/ssd-data-export.md" />
    <script src="/graph-assets/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #050a12;
            color: #8ba4c4;
            overflow: hidden;
        }
        #graph { width: 100vw; height: 100vh; }

        .title {
            position: fixed; top: 20px; left: 20px; z-index: 10;
            pointer-events: none;
        }
        .title h1 { font-size: 17px; font-weight: 300; color: #7aa8c8; letter-spacing: 0.1em; }
        .title p { font-size: 10px; color: #2a4a5a; margin-top: 3px; }
        .page-nav {
            position: fixed; top: 16px; right: 20px; z-index: 10;
            display: flex; gap: 12px;
        }
        .page-nav a {
            font-family: 'Inter', sans-serif;
            font-size: 11px; color: #3a5a6a; text-decoration: none;
            letter-spacing: 0.05em; padding: 4px 10px;
            border: 1px solid #1a2a3a; border-radius: 12px;
            transition: color 0.2s, border-color 0.2s;
        }
        .page-nav a:hover { color: #7aa8c8; border-color: #3a5a6a; }

        .legend {
            position: fixed; bottom: 16px; left: 16px; z-index: 10;
            display: flex; flex-direction: column; gap: 4px;
            background: rgba(5,10,18,0.85); padding: 10px 12px; border-radius: 6px;
            border: 1px solid #1a2a3a;
        }
        .legend-item {
            display: flex; align-items: center; gap: 6px;
            font-size: 9px; color: #5a7a8a;
        }
        .legend-dot {
            width: 8px; height: 8px; border-radius: 50%;
            flex-shrink: 0; opacity: 0.85;
        }

        .detail {
            position: fixed; top: 0; right: 0; width: 320px; height: 100vh;
            background: linear-gradient(to right, transparent 0%, #080e18 20%);
            padding: 32px 20px 32px 50px; z-index: 20;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            transform: translateX(20px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #1a2a3a transparent;
        }
        .detail.active { opacity: 1; pointer-events: auto; transform: translateX(0); }
        .detail-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 4px;
        }
        .detail-close {
            background: none; border: none; color: #3a5a6a;
            font-size: 16px; cursor: pointer; padding: 4px 0 4px 8px;
            flex-shrink: 0;
        }
        .detail-close:hover { color: #8ba4c4; }
        .detail-title {
            font-size: 16px; font-weight: 300; color: #a0c0e0;
            line-height: 1.3; word-break: break-word;
        }
        .detail-badges {
            display: flex; gap: 5px; flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .detail-badge {
            font-size: 8px; padding: 2px 8px; border-radius: 10px;
            color: #050a12; letter-spacing: 0.04em;
        }
        .detail-img {
            max-width: 100%; border-radius: 6px;
            margin-bottom: 12px;
            border: 1px solid #1a2a3a;
            display: none;
            image-rendering: auto;
            cursor: zoom-in;
        }
        .lightbox {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.92);
            display: flex; align-items: center; justify-content: center;
            cursor: zoom-out;
            opacity: 0; transition: opacity 0.2s;
            pointer-events: none;
        }
        .lightbox.active { opacity: 1; pointer-events: auto; }
        .lightbox img {
            max-width: 95vw; max-height: 95vh;
            object-fit: contain; border-radius: 4px;
        }
        .detail-artist {
            font-size: 10px; color: #5a8a6a; font-weight: 300;
            margin-bottom: 8px; letter-spacing: 0.04em;
        }
        .detail-body {
            font-size: 11px; color: #6a8aaa; font-weight: 300;
            line-height: 1.6; margin-bottom: 12px;
        }
        .detail-species { margin-bottom: 12px; }
        .detail-species-label {
            font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
            color: #3a5a6a; margin-bottom: 6px;
        }
        .detail-species-list { display: flex; gap: 4px; flex-wrap: wrap; }
        .detail-species-pill {
            font-size: 8px; padding: 2px 8px; border-radius: 10px;
            background: #1a3a2a; color: #4aaa6a; letter-spacing: 0.02em;
        }
        .detail-connections {
            margin-bottom: 12px;
            padding-top: 10px; border-top: 1px solid #1a2a3a;
        }
        .detail-connections-label {
            font-size: 8px; letter-spacing: 0.1em; text-transform: uppercase;
            color: #3a5a6a; margin-bottom: 6px;
        }
        .detail-conn-item {
            font-size: 10px; color: #5a7a9a; font-weight: 300; padding: 2px 0;
        }
        .detail-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .detail-link {
            display: inline-block; padding: 4px 12px; border-radius: 14px;
            font-size: 10px; letter-spacing: 0.04em;
            background: rgba(122,168,200,0.12); border: 1px solid #2a4a6a;
            color: #7fffb2; text-decoration: none; cursor: pointer;
            transition: background 0.2s;
        }
        .detail-link:hover { background: rgba(122,168,200,0.25); }
        .detail-footer { padding-top: 10px; border-top: 1px solid #1a2a3a; }
        .detail-meta { font-size: 9px; color: #3a5a6a; margin-bottom: 3px; }
        .detail-path {
            font-size: 8px; color: #2a4a5a; font-family: monospace;
            word-break: break-all; line-height: 1.4;
        }

        @media (max-width: 768px) {
            .legend { bottom: 8px; left: 8px; padding: 8px; }
            .title { top: 10px; left: 12px; }
            .title h1 { font-size: 13px; }
            .title p { display: none; }
            .page-nav {
                top: auto; bottom: 16px; right: auto;
                left: 50%; transform: translateX(-50%);
                z-index: 20;
                background: rgba(5,10,18,0.85);
                padding: 6px 12px;
                border-radius: 16px;
                border: 1px solid #1a2a3a;
            }
            .detail {
                top: auto; bottom: 0; right: 0; left: 0;
                width: 100vw; height: 55vh;
                border-radius: 12px 12px 0 0;
                background: rgba(8,14,24,0.97);
                transform: translateY(20px);
                padding: 20px 16px;
                overscroll-behavior: contain;
            }
            .detail.active { transform: translateY(0); }
        }

        .stats {
            display: none;
        }

        .mini-card {
            position: fixed; z-index: 30;
            background: rgba(8,14,24,0.95);
            border: 1px solid #1a2a3a; border-radius: 6px;
            padding: 10px; max-width: 220px;
            pointer-events: none;
            opacity: 0; transition: opacity 0.15s;
        }
        .mini-card.visible { opacity: 1; }
        .mini-card-title {
            font-size: 11px; font-weight: 300; color: #a0c0e0;
            margin-bottom: 4px; line-height: 1.3;
        }
        .mini-card-badges {
            display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px;
        }
        .mini-card-badge {
            font-size: 7px; padding: 1px 6px; border-radius: 8px;
            color: #050a12; letter-spacing: 0.04em;
        }
        .mini-card-body {
            font-size: 9px; color: #5a7a9a; font-weight: 300;
            line-height: 1.4; margin-bottom: 4px;
            display: -webkit-box; -webkit-line-clamp: 3;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .mini-card-size { font-size: 8px; color: #3a5a6a; }
        .mini-card-img {
            width: 100%; max-height: 120px; object-fit: cover;
            border-radius: 4px; margin-top: 6px;
            display: none;
        }
        .mini-card-img.loaded { display: block; }

        /* Visitor nodes (live injection from SSE) */
        .visitor-ring {
            fill: none;
            stroke: #7fffb2;
            stroke-width: 2;
            opacity: 0.8;
            pointer-events: none;
        }
        /* Chat FAB */
        .chat-btn {
            position: fixed; bottom: 20px; right: 20px; z-index: 50;
            background: rgba(20,40,60,0.9); border: 1px solid #2a4a6a;
            border-radius: 50%; width: 48px; height: 48px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: #7fffb2; font-size: 20px;
            transition: all 0.3s; opacity: 0; pointer-events: none;
        }
        .chat-btn.visible { opacity: 1; pointer-events: auto; }
        .chat-btn:hover { background: rgba(30,60,90,0.95); transform: scale(1.1); }

        /* Full-screen chat mode */
        .chat-mode {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column;
            background: #050a12;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .chat-mode.active { opacity: 1; pointer-events: auto; }
        .chat-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid #1a2a3a;
            background: rgba(8,14,24,0.95); min-height: 48px;
        }
        .chat-header-title {
            font-size: 14px; color: #7aa8c8; font-weight: 300;
            letter-spacing: 0.1em;
        }
        .chat-back {
            background: none; border: 1px solid #2a4a6a; color: #5a7a9a;
            font-size: 12px; padding: 6px 14px; border-radius: 16px;
            cursor: pointer; font-family: inherit;
            min-height: 36px; display: flex; align-items: center;
        }
        .chat-back:hover { color: #7aa8c8; border-color: #4a7a8a; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
        }
        .chat-msg {
            display: flex; max-width: 85%;
        }
        .chat-msg.user { align-self: flex-end; }
        .chat-msg.assistant { align-self: flex-start; }
        .chat-bubble {
            padding: 10px 14px; border-radius: 16px;
            font-size: 14px; line-height: 1.6; word-wrap: break-word;
        }
        .chat-msg.user .chat-bubble {
            background: rgba(40,100,140,0.5); color: #c0e0ff;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.assistant .chat-bubble {
            background: rgba(15,30,50,0.8); color: #a0c8e0;
            border-bottom-left-radius: 4px;
        }
        .chat-bubble a { color: #7fffb2; text-decoration: none; cursor: pointer; }
        .chat-bubble a:hover { text-decoration: underline; }
        .chat-bubble .nav-pill {
            display: inline-block; padding: 3px 10px; margin: 2px 2px;
            border-radius: 12px; font-size: 11px; letter-spacing: 0.04em;
            background: rgba(122,168,200,0.12); border: 1px solid #2a4a6a;
            color: #7fffb2; text-decoration: none; cursor: pointer;
            transition: background 0.2s;
        }
        .chat-bubble .nav-pill:hover {
            background: rgba(122,168,200,0.25); text-decoration: none;
        }
        .chat-loading-dots {
            display: none; align-self: flex-start; padding: 10px 16px;
            gap: 4px; align-items: center;
        }
        .chat-loading-dots span {
            width: 6px; height: 6px; border-radius: 50%;
            background: #3a5a6a; display: inline-block;
            animation: chatDot 1.2s ease-in-out infinite;
        }
        .chat-loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .chat-loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes chatDot { 0%,80%,100%{opacity:0.3;transform:scale(1)} 40%{opacity:1;transform:scale(1.3)} }
        .chat-input-area {
            padding: 12px 16px; border-top: 1px solid #1a2a3a;
            display: flex; gap: 8px; align-items: flex-end;
            background: rgba(8,14,24,0.95);
        }
        .chat-input {
            flex: 1; background: rgba(15,25,40,0.8); border: 1px solid #2a4a6a;
            border-radius: 20px; padding: 10px 16px; color: #c0d8f0;
            font-size: 14px; font-family: inherit; outline: none;
            resize: none; max-height: 120px; line-height: 1.4;
        }
        .chat-input::placeholder { color: #3a5a6a; }
        .chat-send {
            background: rgba(40,100,140,0.5); border: 1px solid #2a4a6a;
            border-radius: 50%; width: 40px; height: 40px;
            color: #7fffb2; font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .chat-send:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Knowledge panel (bottom sheet) */
        .kp-overlay {
            position: fixed; inset: 0; z-index: 110;
            background: rgba(0,0,0,0.5); opacity: 0;
            pointer-events: none; transition: opacity 0.3s;
        }
        .kp-overlay.active { opacity: 1; pointer-events: auto; }
        .knowledge-panel {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 120;
            max-height: 60vh; background: rgba(8,14,24,0.98);
            border-top: 1px solid #2a4a6a; border-radius: 16px 16px 0 0;
            padding: 16px 20px 24px; overflow-y: auto;
            transform: translateY(100%); transition: transform 0.3s;
        }
        .knowledge-panel.active { transform: translateY(0); }
        .kp-handle {
            width: 32px; height: 4px; border-radius: 2px;
            background: #2a4a5a; margin: 0 auto 12px;
        }
        .kp-close {
            position: absolute; top: 12px; right: 16px;
            background: none; border: none; color: #5a7a9a;
            font-size: 20px; cursor: pointer;
        }
        .kp-close:hover { color: #8ba4c4; }
        .kp-title { font-size: 16px; color: #a0c0e0; font-weight: 300; margin-bottom: 4px; }
        .kp-badge {
            display: inline-block; padding: 2px 10px; border-radius: 10px;
            font-size: 9px; letter-spacing: 0.06em;
            background: rgba(122,168,200,0.15); color: #7aa8c8;
            margin-bottom: 10px;
        }
        .kp-body { font-size: 13px; color: #8ba4c4; line-height: 1.6; }
        .kp-thumb { max-width: 100%; border-radius: 6px; margin: 10px 0; }

        @media (max-width: 768px) {
            .chat-btn { bottom: 16px; right: 16px; width: 44px; height: 44px; }
        }
    </style>
</head>
<body>
    <button class="chat-btn" id="chatBtn" title="Ask about the exhibit">&#x1F4AC;</button>
    <div class="chat-mode" id="chatMode" style="display:none">
        <div class="chat-header">
            <span class="chat-header-title">~ Salish Sea Dreaming ~</span>
            <button class="chat-back" id="chatBack">&larr; back</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-loading-dots" id="chatLoading"><span></span><span></span><span></span></div>
        <div class="chat-input-area">
            <textarea class="chat-input" id="chatInput" rows="1" maxlength="500"
                placeholder="ask the sea..." autocomplete="off"></textarea>
            <button class="chat-send" id="chatSend">&rarr;</button>
        </div>
    </div>
    <div class="kp-overlay" id="kpOverlay"></div>
    <div class="knowledge-panel" id="knowledgePanel">
        <div class="kp-handle"></div>
        <button class="kp-close" id="kpClose">&times;</button>
        <div id="kpContent"></div>
    </div>
    <div class="title">
        <h1>salish sea dreaming — data map</h1>
        <p id="subtitle">loading...</p>
    </div>
    <div class="page-nav">
        <a href="/">Home</a>
        <a href="/graph-assets/dreamworld.html">Dreamworld</a>
    </div>
    <div class="stats" id="stats"></div>
    <div class="legend" id="legend"></div>
    <div class="detail" id="detail">
        <div class="detail-header">
            <div class="detail-title" id="detail-title"></div>
            <button class="detail-close" id="detail-close" aria-label="Close detail panel">&times;</button>
        </div>
        <div class="detail-badges" id="detail-badges"></div>
        <img class="detail-img" id="detail-img" alt="" loading="lazy">
        <div class="detail-artist" id="detail-artist"></div>
        <div class="detail-body" id="detail-body"></div>
        <div class="detail-links" id="detail-links" style="display:none"></div>
        <div class="detail-species" id="detail-species" style="display:none">
            <div class="detail-species-label">species depicted</div>
            <div class="detail-species-list" id="detail-species-list"></div>
        </div>
        <div class="detail-connections" id="detail-connections">
            <div class="detail-connections-label">connected to</div>
            <div id="detail-conn-list"></div>
        </div>
        <div class="detail-footer">
            <div class="detail-meta" id="detail-meta"></div>
            <div class="detail-path" id="detail-path"></div>
        </div>
    </div>
    <div class="mini-card" id="mini-card">
        <div class="mini-card-title" id="mc-title"></div>
        <div class="mini-card-badges" id="mc-badges"></div>
        <div class="mini-card-body" id="mc-body"></div>
        <div class="mini-card-size" id="mc-size"></div>
        <img class="mini-card-img" id="mc-img" alt="" loading="lazy">
    </div>
    <div class="lightbox" id="lightbox"><img id="lightbox-img" alt=""></div>
    <div id="graph"></div>

    <script>
    (async function() {
        // ── Load graph data ────────────────────────────────────
        let resp;
        try { resp = await fetch('ssd-data-map-zoom.json'); }
        catch (e) {
            document.getElementById('subtitle').textContent = 'network error \u2014 tap to reload';
            document.getElementById('subtitle').style.cursor = 'pointer';
            document.getElementById('subtitle').addEventListener('click', () => location.reload());
            return;
        }
        if (!resp.ok) {
            document.getElementById('subtitle').textContent = 'failed to load \u2014 tap to reload';
            document.getElementById('subtitle').style.cursor = 'pointer';
            document.getElementById('subtitle').addEventListener('click', () => location.reload());
            return;
        }
        const data = await resp.json();
        const isMobile = window.innerWidth <= 768;
        const themeColors = data.theme_colors;
        const extColors = data.ext_colors || {};
        themeColors['visitor'] = '#7fffb2';
        const HUB_COLORS = {
            'hub:briony-art':     '#c8a06a',
            'hub:research-data':  '#4a8ab0',
            'hub:ecosystem':      '#5aaa7a',
            'hub:marine-ref':     '#6a8ac8',
            'hub:training':       '#aa6a8a',
            'hub:generated':      '#c8a04a',
            'hub:video':          '#8a6ac8',
            'hub:docs':           '#6aaac8',
            'hub:code':           '#c86a6a',
            'hub:other':          '#6a8a8a',
            'hub:visitor-dreams': '#7fffb2',
        };

        // ── Stats ──────────────────────────────────────────────
        document.getElementById('subtitle').textContent =
            data.meta.total_nodes + ' nodes \u00b7 ' +
            data.meta.corpus_images + ' images \u00b7 click a hub to explore';
        document.getElementById('stats').textContent =
            data.meta.species_count + ' species \u00b7 ' + data.meta.hub_count + ' hubs';

        // ── Card data (async, non-blocking) ────────────────────
        let cardData = {};
        let speciesData = {};
        let detailImageMap = {}; // node_id → high-res file path
        const thumbNodes = new Set();

        fetch('ssd-cards.json')
            .then(r => r.ok ? r.json() : null)
            .then(d => {
                if (!d) return;
                cardData = d.cards || {};
                speciesData = d.species || {};
                applyThumbnails();
            })
            .catch(() => {
                document.getElementById('subtitle').textContent += ' · card data unavailable';
            });

        // High-res detail images (individual files, loaded on demand)
        fetch('ssd-detail-map.json')
            .then(r => r.ok ? r.json() : {})
            .then(d => { detailImageMap = d; })
            .catch(() => {});

        // ── Precomputed lookups ────────────────────────────────
        const nodeById = {};
        data.nodes.forEach(n => { nodeById[n.id] = n; });

        // Adjacency built before D3 resolves link objects
        const adjacency = {};
        data.links.forEach(l => {
            const s = l.source, t = l.target;
            if (!adjacency[s]) adjacency[s] = [];
            if (!adjacency[t]) adjacency[t] = [];
            adjacency[s].push(t);
            adjacency[t].push(s);
        });

        // Pre-compute _parentId for depth-3+ expansion in semantic zoom
        data.links.forEach(l => {
            const tn = nodeById[l.target];
            if (tn && !tn._parentId) tn._parentId = l.source;
        });

        // ── Visitor hub node ───────────────────────────────
        if (!data.nodes.find(n => n.id === 'hub:visitor-dreams')) {
            const hubNode = {
                id: 'hub:visitor-dreams',
                name: 'Visitor Voices',
                type: 'hub',
                theme: 'visitor',
                size: 500,
                isDir: true,
                depth: 1,
            };
            data.nodes.push(hubNode);
            nodeById['hub:visitor-dreams'] = hubNode;
        }

        // ── Legend ─────────────────────────────────────────────
        const legendEl = document.getElementById('legend');
        const legendTypes = [
            ['hub', '#7fffb2', 'Hub'],
            ['installation', '#ba8a4a', 'Exhibition'],
            ['person', '#d4956a', 'People'],
            ['concept', '#a0c8e0', 'Concept'],
            ['artifact', '#c8a04a', 'Technology'],
            ['species', '#3a8a9a', 'Species'],
        ];
        for (const [type, color, label] of legendTypes) {
            const item = document.createElement('div'); item.className = 'legend-item';
            const dot = document.createElement('div'); dot.className = 'legend-dot';
            dot.style.background = color;
            const span = document.createElement('span'); span.textContent = label;
            item.append(dot, span); legendEl.append(item);
        }

        // ── Helpers ────────────────────────────────────────────
        // Precompute degree (connection count) for each node
        const degree = {};
        data.links.forEach(l => {
            degree[l.source] = (degree[l.source] || 0) + 1;
            degree[l.target] = (degree[l.target] || 0) + 1;
        });
        const maxDegree = Math.max(...Object.values(degree), 1);

        // Sizing strategies — switch by changing sizeMode
        // 'filesize' = original (log of bytes), 'degree' = connectivity
        const NODE_COLORS = {
            'hub': d => HUB_COLORS[d.id] || '#7fffb2',
            'concept': () => '#a0c8e0',
            'person': () => '#d4956a',
            'installation': () => '#ba8a4a',
            'artifact': () => '#c8a04a',
            'software': () => '#7ab0aa',
            'output': () => '#ffe070',
            'interface': () => '#7fffb2',
            'td-internal': () => '#5aaa7a',
            'species': () => '#3a8a9a',
            'cluster-summary': () => '#7a6aaa',
            'photo': () => '#2a5a7a',
            'ml-source': () => '#6a8aaa',
            'report': () => '#6a8aaa',
        };
        const _touchBoost = isMobile ? 1.1 : 1;
        function nodeR(d) {
            switch (d.type) {
                case 'hub': return isMobile ? 22 : 28;
                case 'installation': return isMobile ? 20 : 24;
                case 'concept': return 14;
                case 'person': return 10;
                case 'species': return 8;
                case 'cluster-summary': return 10;
                case 'artifact': case 'software': case 'output': case 'interface': return 10;
                case 'photo': return 6;
                default: return 7;
            }
        }
        function fillColor(d) {
            const fn = NODE_COLORS[d.type];
            return fn ? fn(d) : '#555';
        }
        function strokeColor(d) {
            return d3.color(fillColor(d)).brighter(0.3);
        }
        function formatSize(size) {
            if (size > 1024 * 1024) return (size / 1024 / 1024).toFixed(1) + ' MB';
            if (size > 1024) return (size / 1024).toFixed(0) + ' KB';
            return size + ' bytes';
        }
        function defaultOpacity(d) {
            if (d.type === 'hub') return 0.9;
            return thumbNodes.has(d.id) ? 1 : 0.7;
        }
        function defaultStrokeOpacity(d) {
            if (d.type === 'hub') return 0.9;
            return thumbNodes.has(d.id) ? 0.8 : 0.6;
        }

        // ── Semantic zoom state ────────────────────────────────
        const expandedClusters = new Set();
        const expandedDirs = new Set();

        function isVisible(n) {
            if (n.type === 'hub') return true;
            if (n.type === 'visitor') return true;
            if (n.tier === 0) return true;
            if (!expandedClusters.has(n.clusterHub)) return false;
            if (n.tier === 1) return true;           // tier 1 visible when hub expanded
            // tier 2+ (photos etc) need parent expanded
            return expandedDirs.has(n._parentId);
        }

        function redraw() {
            // Rebuild simulation with only visible nodes + their links
            const sd = _getSimData();
            simData.nodes = sd.nodes;
            simData.links = sd.links;
            simulation.nodes(sd.nodes);
            simulation.force('link').links(sd.links);

            nodeEl.transition().duration(500)
                .attr('r', d => {
                    if (!isVisible(d)) return 0;
                    if (d.type === 'hub') return 28;
                    return thumbNodes.has(d.id) ? 14 : nodeR(d);
                })
                .attr('fill-opacity', d => isVisible(d) ? defaultOpacity(d) : 0)
                .attr('stroke-opacity', d => isVisible(d) ? defaultStrokeOpacity(d) : 0);
            link.transition().duration(500)
                .attr('stroke-opacity', d => {
                    const sid = d.source.id || d.source;
                    const tid = d.target.id || d.target;
                    const sn = nodeById[sid], tn = nodeById[tid];
                    return (sn && tn && isVisible(sn) && isVisible(tn)) ? 0.4 : 0;
                });
            if (isMobile) {
                mobileLabels.transition().duration(500)
                    .attr('opacity', d => isVisible(d) ? 0.85 : 0);
            }
            simulation.alpha(0.3).restart();
        }

        // ── Graph ──────────────────────────────────────────────
        const w = window.innerWidth, h = window.innerHeight;
        const svg = d3.select('#graph').append('svg')
            .attr('width', w).attr('height', h)
            .attr('role', 'img')
            .attr('aria-label', 'Salish Sea Dreaming data map');
        const gEl = svg.append('g');
        svg.call(d3.zoom().scaleExtent([0.1, 8])
            .on('zoom', e => gEl.attr('transform', e.transform)));

        // Pre-position hub nodes in a circle — smaller on mobile
        const _hubs = data.nodes.filter(n => n.type === 'hub');
        const _angleStep = (2 * Math.PI) / _hubs.length;
        const _hubRadius = isMobile ? Math.min(w, h) * 0.28 : 260;
        const _hubPos = {};
        _hubs.forEach((n, i) => {
            n.x = w / 2 + Math.cos(i * _angleStep - Math.PI / 2) * _hubRadius;
            n.y = h / 2 + Math.sin(i * _angleStep - Math.PI / 2) * _hubRadius;
            _hubPos[n.id] = { x: n.x, y: n.y };
        });
        // Pre-position all other nodes near their hub (or center).
        data.nodes.forEach(n => {
            if (n.type === 'hub') return;
            const hp = _hubPos[n.clusterHub] || { x: w / 2, y: h / 2 };
            n.x = hp.x + (Math.random() - 0.5) * 60;
            n.y = hp.y + (Math.random() - 0.5) * 60;
        });

        // Only simulate visible nodes — invisible nodes stay at their
        // pre-positioned coordinates and exert zero force.
        const _fScale = isMobile ? 0.5 : 1;
        function _getSimData() {
            const sn = data.nodes.filter(n => isVisible(n));
            const ids = new Set(sn.map(n => n.id));
            const sl = data.links.filter(l => {
                const sid = l.source.id != null ? l.source.id : l.source;
                const tid = l.target.id != null ? l.target.id : l.target;
                return ids.has(sid) && ids.has(tid);
            });
            return { nodes: sn, links: sl };
        }
        const simData = _getSimData();
        const simulation = d3.forceSimulation(simData.nodes)
            .force('link', d3.forceLink(simData.links).id(d => d.id)
                .distance(d => {
                    const t = typeof d.target === 'object' ? d.target : nodeById[d.target];
                    return ((t && t.type === 'hub') ? 120 : 20) * _fScale;
                })
                .strength(d => {
                    const t = typeof d.target === 'object' ? d.target : nodeById[d.target];
                    return (t && t.type === 'hub') ? 0.3 : 0.6;
                }))
            .force('charge', d3.forceManyBody()
                .strength(d => (d.type === 'hub' ? -500 : -30) * _fScale)
                .distanceMax(350 * _fScale))
            .force('cluster', function(alpha) {
                for (const n of simData.nodes) {
                    if (n.type === 'hub' || !n.clusterHub) continue;
                    const hub = nodeById[n.clusterHub];
                    if (!hub || hub.x == null) continue;
                    const k = 0.12 * alpha;
                    n.vx += (hub.x - n.x) * k;
                    n.vy += (hub.y - n.y) * k;
                }
            })
            .force('center', d3.forceCenter(w / 2, h / 2).strength(0.15))
            .force('collision', d3.forceCollide().radius(d => nodeR(d) + (isMobile ? 8 : 1)))
            .alphaDecay(0.06);

        const link = gEl.append('g').selectAll('line').data(data.links).join('line')
            .attr('stroke', d => {
                const sid = d.source.id || d.source;
                const sn = nodeById[sid];
                return sn && sn.type === 'hub' ? (HUB_COLORS[sn.id] || '#2a4a6a') : '#2a4a6a';
            })
            .attr('stroke-opacity', d => {
                const sid = d.source.id || d.source;
                const tid = d.target.id || d.target;
                const sn = nodeById[sid], tn = nodeById[tid];
                return (sn && tn && isVisible(sn) && isVisible(tn)) ? 0.4 : 0;
            })
            .attr('stroke-width', 0.7);

        const nodeEl = gEl.append('g').selectAll('circle').data(data.nodes).join('circle')
            .attr('r', d => isVisible(d) ? (d.type === 'hub' ? 28 : nodeR(d)) : 0)
            .attr('fill', d => fillColor(d))
            .attr('fill-opacity', d => isVisible(d) ? defaultOpacity(d) : 0)
            .attr('stroke', d => strokeColor(d))
            .attr('stroke-width', d => d.type === 'hub' ? 2.5 : 1)
            .attr('stroke-opacity', d => isVisible(d) ? defaultStrokeOpacity(d) : 0)
            .style('cursor', 'pointer');

        const labels = gEl.append('g').selectAll('text')
            .data(data.nodes.filter(n => n.type === 'source' || n.type === 'installation')).join('text')
            .attr('font-size', d => d.type === 'installation' ? '11px' : '9px')
            .attr('fill', d => d.type === 'installation' ? '#ba8a4a' : '#4a7a9a')
            .attr('text-anchor', 'middle').attr('dy', d => nodeR(d) + (isMobile ? 16 : 12))
            .attr('font-weight', d => d.type === 'installation' ? '400' : '300')
            .attr('pointer-events', 'none')
            .text(d => d.name);
        const hubLabels = gEl.append('g').selectAll('text')
            .data(data.nodes.filter(n => n.type === 'hub')).join('text')
            .attr('font-size', '12px').attr('fill', d => HUB_COLORS[d.id] || '#7fffb2')
            .attr('text-anchor', 'middle')
            .attr('dy', d => -(nodeR(d) + (isMobile ? 14 : 10)))
            .attr('dominant-baseline', 'auto')
            .attr('font-weight', '500').attr('pointer-events', 'none')
            .text(d => d.name);
        const hubCounts = gEl.append('g').selectAll('text')
            .data(data.nodes.filter(n => n.type === 'hub' && n.childCount > 0)).join('text')
            .attr('font-size', '9px').attr('fill', 'rgba(255,255,255,0.35)')
            .attr('text-anchor', 'middle').attr('dy', '-1.1em')
            .attr('pointer-events', 'none')
            .text(d => '\u00d7' + d.childCount);

        // ── Mobile node labels ────────────────────────────────
        // On mobile, show truncated names below non-hub visible nodes.
        // On desktop these stay hidden (hover mini-card serves this role).
        function truncName(name, max) {
            return name.length > max ? name.slice(0, max - 1) + '\u2026' : name;
        }
        const mobileNodes = data.nodes.filter(n =>
            n.type !== 'hub' && n.type !== 'source'
        );
        const mobileLabels = gEl.append('g').selectAll('text')
            .data(mobileNodes).join('text')
            .attr('font-size', d => d.type === 'installation' ? '10px' : '8px')
            .attr('fill', d => d3.color(fillColor(d)).brighter(0.6))
            .attr('text-anchor', 'middle')
            .attr('dy', d => nodeR(d) + (d.type === 'installation' ? 14 : 10))
            .attr('font-weight', d => d.type === 'installation' ? '400' : '300')
            .attr('pointer-events', 'none')
            .attr('opacity', d => isMobile && isVisible(d) ? 0.85 : 0)
            .text(d => truncName(d.name, 18));

        // ── Tick ───────────────────────────────────────────────
        simulation.on('tick', () => {
            link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
            nodeEl.attr('cx', d => d.x).attr('cy', d => d.y);
            labels.attr('x', d => d.x).attr('y', d => d.y);
            hubLabels.attr('x', d => d.x).attr('y', d => d.y);
            hubCounts.attr('x', d => d.x).attr('y', d => d.y);
            mobileLabels.attr('x', d => d.x).attr('y', d => d.y);
        });
        let morphDone = false;
        simulation.on('end', () => { morphDone = true; });

        // ── Drag + Click ──────────────────────────────────────
        // D3 drag consumes pointer events, so we detect clicks
        // inside drag handlers (< 4px movement = click).
        // _suppressReset prevents svg background click from undoing
        // a showDetail that was just triggered by drag-end.
        let _dragStartX = 0, _dragStartY = 0, _wasDragged = false;
        let _suppressReset = false;
        nodeEl.call(d3.drag()
            .on('start', (e, d) => {
                hideMiniCard();
                _dragStartX = e.x; _dragStartY = e.y; _wasDragged = false;
                if (!e.active) simulation.alphaTarget(0.1).restart();
                d.fx = d.x; d.fy = d.y;
            })
            .on('drag', (e, d) => {
                const dx = e.x - _dragStartX, dy = e.y - _dragStartY;
                if (dx * dx + dy * dy > 16) _wasDragged = true;
                d.fx = e.x; d.fy = e.y;
            })
            .on('end', (e, d) => {
                if (!e.active) simulation.alphaTarget(0);
                d.fx = null; d.fy = null;
                if (!_wasDragged) {
                    _suppressReset = true;
                    handleNodeClick(d);
                    // Clear after the click event finishes propagating
                    setTimeout(() => { _suppressReset = false; }, 0);
                }
            })
        );
        function handleNodeClick(d) {
            // Hub click: toggle expansion + show detail
            if (d.type === 'hub' && d.id !== 'hub:visitor-dreams') {
                if (expandedClusters.has(d.id)) {
                    expandedClusters.delete(d.id);
                    data.nodes.filter(n => n.clusterHub === d.id)
                        .forEach(n => expandedDirs.delete(n.id));
                } else {
                    expandedClusters.add(d.id);
                }
                redraw();
            }
            // Cluster/species: toggle children
            if (d.type === 'cluster-summary' || d.type === 'species') {
                if (expandedDirs.has(d.id)) expandedDirs.delete(d.id);
                else expandedDirs.add(d.id);
                redraw();
            }
            showDetail(d);
        }
        svg.on('click', () => { if (!_suppressReset) resetHighlight(); });
        // ── Lightbox ────────────────────────────────────────────
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        document.getElementById('detail-img').addEventListener('click', e => {
            e.stopPropagation();
            lightboxImg.src = e.target.src;
            lightboxImg.alt = e.target.alt;
            lightbox.classList.add('active');
        });
        lightbox.addEventListener('click', () => lightbox.classList.remove('active'));

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                if (lightbox.classList.contains('active')) lightbox.classList.remove('active');
                else resetHighlight();
            }
            // S key toggles sizing mode
            if (e.key === 's' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
                const modes = Object.keys(sizeFns);
                sizeMode = modes[(modes.indexOf(sizeMode) + 1) % modes.length];
                nodeEl.transition().duration(400)
                    .attr('r', d => thumbNodes.has(d.id) ? 14 : nodeR(d));
                simulation.force('collision', d3.forceCollide().radius(d => nodeR(d) + 1.5));
                simulation.alpha(0.05).restart();
                document.getElementById('stats').textContent =
                    data.meta.species_count + ' species · ' +
                    data.meta.hub_count + ' hubs';
            }
        });

        // ── Hover mini-card ────────────────────────────────────
        const mc = document.getElementById('mini-card');
        const mcTitle = document.getElementById('mc-title');
        const mcBadges = document.getElementById('mc-badges');
        const mcBody = document.getElementById('mc-body');
        const mcSize = document.getElementById('mc-size');
        const mcImg = document.getElementById('mc-img');
        const themeBadgeEl = document.createElement('span'); themeBadgeEl.className = 'mini-card-badge';
        const extBadgeEl = document.createElement('span'); extBadgeEl.className = 'mini-card-badge';

        function positionMiniCard(x, y) {
            const pad = 12, mcW = 220, mcH = 200;
            x = Math.min(Math.max(x + pad, pad), window.innerWidth - mcW - pad);
            y = Math.min(Math.max(y + pad, pad), window.innerHeight - mcH - pad);
            mc.style.left = x + 'px'; mc.style.top = y + 'px';
        }

        function showMiniCard(x, y, d) {
            if (_wasDragged) return;
            const card = cardData[d.id] || {};
            mcTitle.textContent = card.title || d.name;
            mcBadges.textContent = '';
            themeBadgeEl.style.background = fillColor(d);
            themeBadgeEl.textContent = d.type.replace(/-/g, ' ');
            mcBadges.append(themeBadgeEl);
            const body = card.body || '';
            mcBody.textContent = body; mcBody.style.display = body ? 'block' : 'none';
            mcSize.textContent = d.type;
            const url = card.thumbnail_url || '';
            mcImg.classList.remove('loaded');
            if (url) {
                mcImg.onload = function() { this.classList.add('loaded'); };
                mcImg.onerror = function() { this.classList.remove('loaded'); };
                mcImg.src = url;
                if (mcImg.complete && mcImg.naturalWidth > 0) mcImg.classList.add('loaded');
            } else { mcImg.removeAttribute('src'); }
            positionMiniCard(x, y);
            mc.classList.add('visible');
        }

        function hideMiniCard() { mc.classList.remove('visible'); }

        nodeEl.on('mouseenter', (e, d) => showMiniCard(e.clientX, e.clientY, d))
              .on('mouseleave', hideMiniCard)
              .on('mousemove', e => { if (mc.classList.contains('visible')) positionMiniCard(e.clientX, e.clientY); });

        // ── Detail panel ───────────────────────────────────────
        let activeProbe = null;

        function showDetail(d) {
            hideMiniCard();
            const card = cardData[d.id] || {};

            document.getElementById('detail-title').textContent = card.title || d.name;

            // Badges
            const badgesEl = document.getElementById('detail-badges');
            badgesEl.textContent = '';
            function addBadge(text, bg) {
                const b = document.createElement('span');
                b.className = 'detail-badge'; b.style.background = bg; b.textContent = text;
                badgesEl.append(b);
            }
            addBadge(d.type.replace(/-/g, ' '), fillColor(d));
            if (d.tier !== undefined) addBadge('tier ' + d.tier, '#3a5a6a');

            // Image — prefer fullUrl (512px), fall back to thumbUrl (80px), then card thumbnail
            const imgEl = document.getElementById('detail-img');
            if (activeProbe) { activeProbe.onload = activeProbe.onerror = null; activeProbe = null; }
            const fullUrl = d.fullUrl || card.fullUrl || '';
            const thumbUrl = d.thumbUrl || card.thumbnail_url || '';
            const imgUrl = fullUrl || thumbUrl;
            if (imgUrl) {
                imgEl.alt = card.title || d.name;
                if (fullUrl && thumbUrl) {
                    // Show thumb immediately, load full-res in background
                    imgEl.src = thumbUrl;
                    const probe = new Image(); activeProbe = probe;
                    probe.onload = function() { imgEl.src = fullUrl; };
                    probe.onerror = function() {}; // keep thumb on error
                    probe.src = fullUrl;
                } else {
                    imgEl.src = imgUrl;
                }
                imgEl.style.display = 'block';
            } else {
                imgEl.style.display = 'none'; imgEl.removeAttribute('src');
            }

            // Artist
            const artistEl = document.getElementById('detail-artist');
            artistEl.textContent = card.artist || '';
            artistEl.style.display = card.artist ? 'block' : 'none';

            // Body
            const bodyEl = document.getElementById('detail-body');
            const fullText = [card.body, card.notes].filter(Boolean).join('\n\n');
            bodyEl.textContent = fullText;
            bodyEl.style.display = fullText ? 'block' : 'none';

            // Links
            const linksEl = document.getElementById('detail-links');
            linksEl.textContent = '';
            const cardLinks = card.links || [];
            if (cardLinks.length > 0) {
                cardLinks.forEach(l => {
                    const a = document.createElement('a');
                    a.className = 'detail-link';
                    a.href = l.url;
                    a.target = '_blank';
                    a.textContent = l.label;
                    linksEl.append(a);
                });
                linksEl.style.display = 'flex';
            } else {
                linksEl.style.display = 'none';
            }

            // Species
            const speciesEl = document.getElementById('detail-species');
            const speciesList = document.getElementById('detail-species-list');
            const speciesIds = card.species || [];
            speciesList.textContent = '';
            if (speciesIds.length > 0) {
                for (const sid of speciesIds) {
                    const sp = speciesData[sid];
                    const pill = document.createElement('span');
                    pill.className = 'detail-species-pill';
                    pill.textContent = sp ? sp.title : sid.replace('species:', '');
                    if (sp && sp.scientific_name) pill.title = sp.scientific_name;
                    speciesList.append(pill);
                }
                speciesEl.style.display = 'block';
            } else { speciesEl.style.display = 'none'; }

            // Connections
            const connList = document.getElementById('detail-conn-list');
            connList.textContent = '';
            const neighbors = adjacency[d.id] || [];
            const connected = new Set([d.id, ...neighbors]);
            for (const nid of neighbors.slice(0, 15)) {
                const neighbor = nodeById[nid];
                if (!neighbor) continue;
                const item = document.createElement('div'); item.className = 'detail-conn-item';
                item.textContent = (cardData[nid] || {}).title || neighbor.name;
                connList.append(item);
            }
            if (neighbors.length > 15) {
                const more = document.createElement('div');
                more.className = 'detail-conn-item'; more.style.color = '#2a4a5a';
                more.textContent = '+ ' + (neighbors.length - 15) + ' more';
                connList.append(more);
            }

            // Footer
            document.getElementById('detail-meta').textContent =
                d.type + (d.clusterHub ? ' \u00b7 ' + (nodeById[d.clusterHub]?.name || d.clusterHub) : '');
            document.getElementById('detail-path').textContent = d.id;

            document.getElementById('detail').classList.add('active');

            // Highlight
            nodeEl.attr('fill-opacity', n => {
                if (!isVisible(n)) return 0;
                if (n.type === 'hub') return connected.has(n.id) ? 0.9 : 0.35;
                return connected.has(n.id) ? (thumbNodes.has(n.id) ? 1 : 0.9) : 0.08;
            }).attr('stroke-opacity', n => {
                if (!isVisible(n)) return 0;
                return connected.has(n.id) ? 0.8 : 0.05;
            });
            link.attr('stroke-opacity', l => {
                const s = l.source.id, t = l.target.id;
                const sn = nodeById[s], tn = nodeById[t];
                if (!sn || !tn || !isVisible(sn) || !isVisible(tn)) return 0;
                return (s === d.id || t === d.id) ? 0.6 : 0.03;
            });
        }

        function resetHighlight() {
            document.getElementById('detail').classList.remove('active');
            nodeEl.attr('fill-opacity', d => isVisible(d) ? defaultOpacity(d) : 0)
                  .attr('stroke-opacity', d => isVisible(d) ? defaultStrokeOpacity(d) : 0);
            link.attr('stroke-opacity', d => {
                const sid = d.source.id || d.source;
                const tid = d.target.id || d.target;
                const sn = nodeById[sid], tn = nodeById[tid];
                return (sn && tn && isVisible(sn) && isVisible(tn)) ? 0.5 : 0;
            });
        }

        let highlightTimer = null;
        function highlightTheme(theme) {
            if (highlightTimer) clearTimeout(highlightTimer);
            nodeEl.attr('fill-opacity', n => n.theme === theme ? (thumbNodes.has(n.id) ? 1 : 0.9) : (thumbNodes.has(n.id) ? 0.3 : 0.06))
                  .attr('stroke-opacity', n => n.theme === theme ? 0.8 : 0.04);
            link.attr('stroke-opacity', 0.03);
            highlightTimer = setTimeout(resetHighlight, 4000);
        }

        document.getElementById('detail-close').addEventListener('click', e => {
            e.stopPropagation(); resetHighlight();
        });

        // ── Thumbnail pattern fills (visual only, no simulation restart) ──
        // Strategy: convert base64 data URIs to blob URLs first, then create
        // SVG patterns from lightweight URLs. Raw base64 in SVG <pattern> <image>
        // elements chokes the browser at 500+ patterns (4+ MB inline DOM data).
        function applyThumbnails() {
            const entries = []; // {url, blobUrl, index}
            const seenUrls = new Map(); // original url → index

            // Phase 1: collect unique URLs, convert base64 → blob
            for (const node of data.nodes) {
                const card = cardData[node.id];
                if (!card || !card.thumbnail_url) continue;
                const url = card.thumbnail_url;
                if (!seenUrls.has(url)) {
                    let href = url;
                    if (url.startsWith('data:')) {
                        // Convert base64 data URI to blob URL
                        try {
                            const [header, b64] = url.split(',');
                            const mime = header.match(/data:([^;]+)/)?.[1] || 'image/jpeg';
                            const bin = atob(b64);
                            const arr = new Uint8Array(bin.length);
                            for (let j = 0; j < bin.length; j++) arr[j] = bin.charCodeAt(j);
                            href = URL.createObjectURL(new Blob([arr], { type: mime }));
                        } catch (e) { href = url; } // fallback to raw data URI
                    } else {
                        href = url.replace('?format=200w', '?format=500w');
                    }
                    const idx = entries.length;
                    seenUrls.set(url, idx);
                    entries.push({ url, href, index: idx });
                }
                thumbNodes.add(node.id);
            }
            if (entries.length === 0) return;

            // Phase 2: create SVG patterns using blob/CDN URLs (no inline base64)
            const defs = svg.append('defs');
            for (const entry of entries) {
                const pat = defs.append('pattern')
                    .attr('id', 'thumb-' + entry.index)
                    .attr('width', 1).attr('height', 1)
                    .attr('patternContentUnits', 'objectBoundingBox');
                pat.append('image')
                    .attr('href', entry.href)
                    .attr('width', 1).attr('height', 1)
                    .attr('preserveAspectRatio', 'xMidYMid slice');
            }

            // Phase 3: update node visuals
            function patternFor(nodeId) {
                const card = cardData[nodeId];
                if (!card || !card.thumbnail_url) return -1;
                return seenUrls.get(card.thumbnail_url) ?? -1;
            }

            nodeEl
                .attr('r', d => {
                    if (!isVisible(d)) return 0;
                    if (d.type === 'hub') return 28;
                    return thumbNodes.has(d.id) ? 14 : nodeR(d);
                })
                .attr('fill', d => { const p = patternFor(d.id); return p >= 0 ? 'url(#thumb-' + p + ')' : fillColor(d); })
                .attr('fill-opacity', d => isVisible(d) ? defaultOpacity(d) : 0)
                .attr('stroke', d => strokeColor(d))
                .attr('stroke-width', d => d.type === 'hub' ? 2.5 : 1)
                .attr('stroke-opacity', d => isVisible(d) ? defaultStrokeOpacity(d) : 0);

        }
        // ── Live visitor prompt injection ─────────────────
        const _visitorCircles = [];
        const _visitorLabels = [];
        const _visitorLinks = [];
        const _linkGroup = d3.select(link.node().parentNode);
        const _nodeGroup = d3.select(nodeEl.node().parentNode);
        const _labelGroup = labels.node() ? d3.select(labels.node().parentNode) : _nodeGroup;

        // hub:visitor-dreams label is rendered by the hubLabels selection above
        const _hubNode = data.nodes.find(n => n.id === 'hub:visitor-dreams');

        // Secondary tick handler for dynamically-added visitor elements
        simulation.on('tick.visitor', () => {
            for (const c of _visitorCircles) {
                const d = c.datum();
                c.attr('cx', d.x).attr('cy', d.y);
            }
            for (const l of _visitorLabels) {
                const d = l.datum();
                l.attr('x', d.x).attr('y', d.y);
            }
            for (const ln of _visitorLinks) {
                const d = ln.datum();
                ln.attr('x1', d.source.x).attr('y1', d.source.y)
                  .attr('x2', d.target.x).attr('y2', d.target.y);
            }
            // Also update hub label position
            if (_hubNode) {
                _labelGroup.selectAll('text')
                    .filter(d => d && d.id === 'hub:visitor-dreams')
                    .attr('x', _hubNode.x).attr('y', _hubNode.y);
            }
        });

        function addVisitorNode(evt) {
            const nodeId = 'visitor-' + evt.id;
            if (data.nodes.find(n => n.id === nodeId)) return;

            const newNode = {
                id: nodeId,
                name: evt.text.length > 40 ? evt.text.slice(0, 40) + '\u2026' : evt.text,
                type: 'visitor',
                theme: 'visitor',
                size: 200,
                ext: '',
                isDir: false,
                depth: 2,
            };

            // Position near hub
            const hub = data.nodes.find(n => n.id === 'hub:visitor-dreams');
            if (hub) {
                newNode.x = hub.x + (Math.random() - 0.5) * 80;
                newNode.y = hub.y + (Math.random() - 0.5) * 80;
            }

            data.nodes.push(newNode);
            nodeById[newNode.id] = newNode;
            const newLinkData = { source: nodeId, target: 'hub:visitor-dreams' };
            data.links.push(newLinkData);

            // Update adjacency
            if (!adjacency[nodeId]) adjacency[nodeId] = [];
            adjacency[nodeId].push('hub:visitor-dreams');
            if (!adjacency['hub:visitor-dreams']) adjacency['hub:visitor-dreams'] = [];
            adjacency['hub:visitor-dreams'].push(nodeId);

            // Card data for detail panel
            cardData[nodeId] = {
                title: evt.text,
                body: 'Visitor offering \u00b7 ' + evt.source,
            };

            // Add link line
            const newLinkEl = _linkGroup.append('line')
                .datum(newLinkData)
                .attr('stroke', '#7fffb2').attr('stroke-opacity', 0.4).attr('stroke-width', 0.6);
            _visitorLinks.push(newLinkEl);

            // Add circle with entry animation
            const newCircle = _nodeGroup.append('circle')
                .datum(newNode)
                .attr('r', 0)
                .attr('cx', newNode.x || 0)
                .attr('cy', newNode.y || 0)
                .attr('fill', '#7fffb2')
                .attr('fill-opacity', 0.9)
                .attr('stroke', '#fff')
                .attr('stroke-width', 2)
                .style('cursor', 'pointer')
                .style('filter', 'drop-shadow(0 0 8px #7fffb2)')
                .on('mouseenter', (e, d) => showMiniCard(e.clientX, e.clientY, d))
                .on('mouseleave', hideMiniCard)
                .call(d3.drag()
                    .on('start', (e, d) => {
                        hideMiniCard();
                        _dragStartX = e.x; _dragStartY = e.y; _wasDragged = false;
                        if (!e.active) simulation.alphaTarget(0.1).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on('drag', (e, d) => {
                        const dx = e.x - _dragStartX, dy = e.y - _dragStartY;
                        if (dx * dx + dy * dy > 16) _wasDragged = true;
                        d.fx = e.x; d.fy = e.y;
                    })
                    .on('end', (e, d) => {
                        if (!e.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                        if (!_wasDragged) {
                            _suppressReset = true;
                            showDetail(d);
                            setTimeout(() => { _suppressReset = false; }, 0);
                        }
                    })
                );
            _visitorCircles.push(newCircle);

            newCircle.transition().duration(800)
                .attr('r', 14)
                .on('end', function() {
                    d3.select(this).transition().duration(2000).attr('r', 10);
                });

            // Pulse ring
            _nodeGroup.append('circle')
                .attr('class', 'visitor-ring')
                .attr('cx', newNode.x || 0).attr('cy', newNode.y || 0).attr('r', 14)
                .transition().duration(1200).attr('r', 40).style('opacity', 0).remove();

            // Add label
            const newLabel = _labelGroup.append('text')
                .datum(newNode)
                .attr('font-size', '9px')
                .attr('fill', '#7fffb2')
                .attr('text-anchor', 'middle')
                .attr('dy', 22)
                .attr('font-weight', '300')
                .attr('pointer-events', 'none')
                .text(newNode.name);
            _visitorLabels.push(newLabel);

            // Restart simulation with new nodes/links
            simulation.nodes(data.nodes);
            simulation.force('link').links(data.links);
            simulation.alpha(0.25).restart();
        }

        // Connect to /graph/stream SSE for live visitor prompts
        (function connectGraphStream() {
            const base = window.location.origin;
            const es = new EventSource(base + '/graph/stream');
            es.onmessage = function(e) {
                if (!e.data || e.data === 'ping') return;
                try {
                    const d = JSON.parse(e.data);
                    if (d.type === 'visitor') addVisitorNode(d);
                } catch(err) {}
            };
            es.onerror = function() {
                es.close();
                setTimeout(connectGraphStream, 5000);
            };
        })();

    // ── Deep-link ──────────────────────────────────────────
    (function() {
        const hashMatch = location.hash.match(/node=([a-zA-Z0-9:_.-]+)/);
        if (hashMatch) {
            const targetId = hashMatch[1];
            function tryDeepLink() {
                const targetNode = nodes.find(n => n.id === targetId);
                if (targetNode) showDetail(targetNode);
            }
            if (morphDone) {
                tryDeepLink();
            } else {
                const checkDeepLink = setInterval(() => {
                    if (morphDone) { tryDeepLink(); clearInterval(checkDeepLink); }
                }, 500);
                setTimeout(() => { tryDeepLink(); clearInterval(checkDeepLink); }, 6000);
            }
        }
    })();

    // ── Full-screen Chat ─────────────────────────────────────
    (function() {
        const chatBtn = document.getElementById('chatBtn');
        const chatMode = document.getElementById('chatMode');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');
        const chatLoading = document.getElementById('chatLoading');
        const chatBack = document.getElementById('chatBack');
        const kpOverlay = document.getElementById('kpOverlay');
        const knowledgePanel = document.getElementById('knowledgePanel');
        const kpContent = document.getElementById('kpContent');
        const kpClose = document.getElementById('kpClose');

        let chatHistory = [], chatOpen = false, chatSending = false;
        let chatInitialized = false, cardData = null, lastSend = 0;

        const WELCOME = 'Welcome to Salish Sea Dreaming \u2014 an experiment in digital entanglement, where technology is not a window onto nature but a place where human care and more-than-human worlds meet.\n\nYou can explore the [emergent dreamworld](/graph-assets/dreamworld.html) to see how visitor dreams weave together, or ask me anything about the installation, the marine species, or the technology behind it.\n\nWhat draws you to the Salish Sea?';

        // Show FAB after graph loads
        const checkMorph = setInterval(() => {
            if (morphDone) { chatBtn.classList.add('visible'); clearInterval(checkMorph); }
        }, 500);
        setTimeout(() => { chatBtn.classList.add('visible'); clearInterval(checkMorph); }, 6000);

        function openChat() {
            chatOpen = true;
            chatMode.style.display = 'flex';
            requestAnimationFrame(() => chatMode.classList.add('active'));
            if (!chatInitialized) {
                chatInitialized = true;
                chatInput.disabled = true; chatSend.disabled = true;
                chatLoading.style.display = 'flex';
                // Fetch card data
                fetch('/graph-assets/ssd-cards.json')
                    .then(r => r.json()).then(d => { cardData = d.cards; }).catch(() => {});
                setTimeout(() => {
                    chatLoading.style.display = 'none';
                    addMsg('assistant', WELCOME);
                    chatHistory = [{ role: 'assistant', content: WELCOME }];
                    chatInput.disabled = false; chatSend.disabled = false;
                    chatInput.focus();
                }, 600);
            } else {
                chatInput.focus();
            }
        }
        function closeChat() {
            chatOpen = false;
            closeKP();
            chatMode.classList.remove('active');
            setTimeout(() => { chatMode.style.display = 'none'; }, 300);
        }

        chatBtn.onclick = openChat;
        chatBack.onclick = closeChat;
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape' && chatOpen) closeChat();
        });

        // ── Markdown rendering ──
        function escapeHtml(t) {
            return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function renderMd(text) {
            let h = escapeHtml(text);
            h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            h = h.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            // [text](#node-id) → knowledge panel link (pill style)
            h = h.replace(/\[([^\]]+)\]\(#([a-zA-Z0-9:_.\-]+)\)/g,
                '<a href="#" data-node="$2" class="nav-pill">$1</a>');
            // [text](/path) → navigation link (pill style)
            h = h.replace(/\[([^\]]+)\]\((\/[a-zA-Z0-9:_.\-\/]+)\)/g,
                '<a href="$2" target="_blank" class="nav-pill">$1</a>');
            // External links
            h = h.replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
                '<a href="$2" target="_blank" rel="noopener">$1</a>');
            return h.replace(/\n/g, '<br>');
        }

        // ── Messages ──
        function addMsg(role, content) {
            const wrapper = document.createElement('div');
            wrapper.className = 'chat-msg ' + role;
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            if (role === 'user') {
                bubble.textContent = content;
            } else {
                bubble.innerHTML = renderMd(content);
                // Wire up knowledge panel links
                bubble.querySelectorAll('a[data-node]').forEach(a => {
                    a.onclick = e => {
                        e.preventDefault();
                        const nid = a.dataset.node;
                        // Try knowledge panel first
                        if (cardData && cardData[nid]) {
                            openKP(nid);
                        } else {
                            // Fall back to graph node selection
                            const node = data.nodes.find(n => n.id === nid);
                            if (node) {
                                closeChat();
                                setTimeout(() => {
                                    if (node.clusterHub && !expandedClusters.has(node.clusterHub)) {
                                        expandedClusters.add(node.clusterHub);
                                        redraw();
                                    }
                                    showDetail(node);
                                }, 350);
                            }
                        }
                    };
                });
            }
            wrapper.appendChild(bubble);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ── Send ──
        async function sendChat() {
            const msg = chatInput.value.trim();
            if (!msg || chatSending) return;
            const now = Date.now();
            if (now - lastSend < 3000) return;
            chatSending = true; chatSend.disabled = true; lastSend = now;
            chatInput.value = ''; chatInput.style.height = 'auto';
            addMsg('user', msg);
            chatLoading.style.display = 'flex';
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const ctrl = new AbortController();
                const tid = setTimeout(() => ctrl.abort(), 15000);
                const res = await fetch('/chat', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg, history: chatHistory.slice(-12) }),
                    signal: ctrl.signal,
                });
                clearTimeout(tid);
                chatLoading.style.display = 'none';
                if (res.ok) {
                    const d = await res.json();
                    if (d.reply) {
                        addMsg('assistant', d.reply);
                        chatHistory.push({ role: 'user', content: msg });
                        chatHistory.push({ role: 'assistant', content: d.reply });
                    } else {
                        addMsg('assistant', 'The sea is quiet right now \u2014 try again in a moment.');
                    }
                } else if (res.status === 429) {
                    addMsg('assistant', 'Please wait a moment before asking again\u2026');
                } else {
                    addMsg('assistant', 'Something went wrong. Please try again.');
                }
            } catch(e) {
                chatLoading.style.display = 'none';
                addMsg('assistant', 'The sea is quiet right now \u2014 try again in a moment.');
            }
            chatSending = false;
            setTimeout(() => { chatSend.disabled = false; }, 3000);
        }

        chatSend.onclick = sendChat;
        chatInput.onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } };
        chatInput.oninput = function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; };

        // ── Knowledge Panel ──
        function openKP(nodeId) {
            const card = cardData && cardData[nodeId];
            if (!card) return;
            kpContent.innerHTML = '';
            const h3 = document.createElement('h3'); h3.className = 'kp-title';
            h3.textContent = card.title || nodeId; kpContent.appendChild(h3);
            const badge = document.createElement('span'); badge.className = 'kp-badge';
            badge.textContent = nodeId.split(':')[0]; kpContent.appendChild(badge);
            if (card.thumbnail_url) {
                const img = document.createElement('img'); img.className = 'kp-thumb';
                img.src = card.thumbnail_url; img.alt = card.title || ''; kpContent.appendChild(img);
            }
            if (card.body) {
                const p = document.createElement('p'); p.className = 'kp-body';
                p.textContent = card.body; kpContent.appendChild(p);
            }
            knowledgePanel.classList.add('active');
            kpOverlay.classList.add('active');
        }
        function closeKP() {
            knowledgePanel.classList.remove('active');
            kpOverlay.classList.remove('active');
        }
        kpClose.onclick = closeKP;
        kpOverlay.onclick = closeKP;
    })();

    })();
    </script>
</body>
