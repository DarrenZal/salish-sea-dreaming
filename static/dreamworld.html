<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salish Sea Dreaming — Dreamworld</title>
    <script src="https://unpkg.com/3d-force-graph@1"></script>
    <script src="https://unpkg.com/three@0.160.1/build/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #050a12; color: #8ba4c4; overflow: hidden; }
        #graph-container { width: 100vw; height: 100vh; }
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 30;
            display: flex; align-items: center; gap: 24px; padding: 14px 20px;
            background: rgba(5, 10, 18, 0.9); border-bottom: 1px solid #1a2a3a;
        }
        .nav-title { font-size: 13px; font-weight: 300; color: #7aa8c8; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
        .nav-links { display: flex; gap: 16px; }
        .nav-links a { font-size: 11px; color: #3a5a6a; text-decoration: none; letter-spacing: 0.05em; padding: 4px 0; border-bottom: 2px solid transparent; transition: color 0.2s; }
        .nav-links a:hover { color: #7aa8c8; }
        .nav-links a.active { color: #7aa8c8; border-bottom-color: #7aa8c8; }
        .nav-controls { display: flex; align-items: center; gap: 10px; }
        .play-btn { background: none; border: 1px solid #2a4a5a; color: #7aa8c8; font-family: 'Inter', sans-serif; font-size: 11px; padding: 4px 14px; border-radius: 12px; cursor: pointer; letter-spacing: 0.05em; transition: background 0.2s; }
        .play-btn:hover { background: rgba(122,168,200,0.1); border-color: #4a7a8a; }
        .play-btn.active { background: rgba(122,168,200,0.15); border-color: #7aa8c8; }
        .play-progress { font-size: 10px; color: #2a4a5a; min-width: 40px; }
        .nav-stats { margin-left: auto; font-size: 10px; color: #2a4a5a; }
        .nav-stats span { color: #4a7a8a; }
        .loading { position: fixed; inset: 0; z-index: 25; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050a12; transition: opacity 0.8s; }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading h2 { font-size: 18px; font-weight: 300; color: #7aa8c8; letter-spacing: 0.15em; }
        .loading p { font-size: 11px; color: #2a4a5a; margin-top: 8px; }
        .loading .pulse { width: 6px; height: 6px; border-radius: 50%; background: #7aa8c8; margin-top: 20px; animation: pulse 1.5s ease-in-out infinite; }
        @keyframes pulse { 0%,100% { opacity:0.3; transform:scale(1); } 50% { opacity:1; transform:scale(1.5); } }
        .info-panel { position: fixed; top: 60px; right: 0; width: 320px; max-height: calc(100vh - 80px); background: linear-gradient(to right, transparent 0%, rgba(5,10,18,0.95) 20%); padding: 24px 20px 24px 48px; z-index: 20; opacity: 0; pointer-events: none; transition: opacity 0.3s, transform 0.3s; transform: translateX(20px); overflow-y: auto; }
        .info-panel.active { opacity: 1; pointer-events: auto; transform: translateX(0); }
        .info-panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .info-panel-close { background: none; border: none; color: #3a5a6a; font-size: 18px; cursor: pointer; padding: 0 0 0 12px; }
        .info-panel-close:hover { color: #8ba4c4; }
        .info-panel .cluster-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 10px; letter-spacing: 0.08em; color: #050a12; font-weight: 400; }
        .info-panel .dream-text { font-size: 14px; font-weight: 300; color: #a0c0e0; line-height: 1.5; margin-top: 12px; }
        .info-panel .dream-meta { font-size: 10px; color: #2a4a5a; margin-top: 10px; }
        .info-panel .dream-orient { font-size: 11px; color: #4a7a8a; margin-top: 8px; font-style: italic; line-height: 1.4; }
        .legend { position: fixed; bottom: 16px; left: 16px; z-index: 10; display: flex; flex-direction: column; gap: 4px; background: rgba(5,10,18,0.85); padding: 10px; border-radius: 6px; border: 1px solid #1a2a3a; }
        .legend h3 { font-size: 8px; letter-spacing: 0.12em; text-transform: uppercase; color: #3a5a6a; margin-bottom: 2px; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 9px; color: #4a6a7a; cursor: pointer; padding: 3px 6px; border-radius: 4px; transition: background 0.2s, color 0.2s; }
        .legend-item:hover { background: rgba(122,168,200,0.1); color: #a0c8e0; }
        .legend-item.selected { background: rgba(122,168,200,0.15); color: #c0dce8; }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        @media (max-width: 600px) {
            .info-panel { top: auto; bottom: 0; left: 0; right: 0; width: 100%; max-height: 50vh; padding: 16px 20px; background: rgba(5,10,18,0.95); border-top: 1px solid #1a2a3a; transform: translateY(20px); }
            .info-panel.active { transform: translateY(0); }
            .nav { gap: 12px; padding: 10px 14px; flex-wrap: wrap; }
            .legend { bottom: 8px; left: 8px; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="nav">
    <span class="nav-title">Salish Sea Dreaming</span>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/graph-assets/ssd-data-map.html">Knowledge Graph</a>
        <a href="/graph-assets/dreamworld.html" class="active">Dreamworld</a>
    </div>
    <div class="nav-controls">
        <button class="play-btn" id="play-btn" onclick="window._dw.togglePlay()">Play</button>
        <span class="play-progress" id="play-progress"></span>
    </div>
    <div class="nav-stats"><span id="dream-count">0</span> dreams in the Salish Sea</div>
</div>
<div class="loading" id="loading"><h2>Dreaming...</h2><p>the Salish Sea is waking up</p><div class="pulse"></div></div>
<div id="graph-container"></div>
<div class="info-panel" id="info-panel">
    <div class="info-panel-header">
        <div><span class="cluster-badge" id="info-cluster"></span></div>
        <button class="info-panel-close" onclick="window._dw.closePanel()">&times;</button>
    </div>
    <div class="dream-text" id="info-text"></div>
    <div class="dream-meta" id="info-meta"></div>
    <div class="dream-orient" id="info-orient"></div>
</div>
<div class="legend" id="legend"><h3>Emergent Clusters</h3><div id="legend-items"></div></div>

<script>
(function() {
    const container = document.getElementById('graph-container');
    const loadingEl = document.getElementById('loading');
    const infoPanel = document.getElementById('info-panel');
    const dreamCountEl = document.getElementById('dream-count');
    const playBtn = document.getElementById('play-btn');
    const playProgressEl = document.getElementById('play-progress');
    const legendItems = document.getElementById('legend-items');

    let graph = null;
    let graphData = { nodes: [], links: [], clusters: [] };
    let angle = 0;
    let lastInteraction = 0;
    let userInteracted = false;

    // Playback
    let playing = false;
    let playIndex = 0;
    let playTimer = null;
    let sortedNodes = [];
    let posMap = {};
    const DWELL_MS = 3500;
    const TRAIL_NEAR = 3;
    const TRAIL_FAR = 6;

    // ---- Timeline spectrum: blue (220°) → pink/red (350°) ----
    function spectrumColor(t, alpha) {
        // t in [0,1], alpha in [0,1]
        const h = ((220 - t * 230) + 360) % 360;
        return 'hsla(' + h + ',65%,55%,' + alpha + ')';
    }

    function hexToRgba(hex, a) {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
        return 'rgba('+r+','+g+','+b+','+a+')';
    }

    function linkEndIds(l) {
        return [typeof l.source === 'object' ? l.source.id : l.source,
                typeof l.target === 'object' ? l.target.id : l.target];
    }

    // ---- Build a lookup: nodeId -> timeline position [0,1] ----
    let tiMap = {};  // nodeId -> normalized timeline position
    function buildTimelineMap() {
        const total = graphData.nodes.length;
        tiMap = {};
        graphData.nodes.forEach(n => { tiMap[n.id] = total > 1 ? n.ti / (total - 1) : 0; });
    }

    // ---- Default link color: timeline spectrum ----
    function defaultLinkColor(l) {
        const [src, tgt] = linkEndIds(l);
        const t = ((tiMap[src] || 0) + (tiMap[tgt] || 0)) / 2;
        return spectrumColor(t, 0.55);
    }
    function defaultLinkWidth() { return 1.2; }

    // ---- Auto-rotation ----
    function rotate() {
        if (!graph) { requestAnimationFrame(rotate); return; }
        if (!playing && (!userInteracted || Date.now() - lastInteraction > 5000)) {
            angle += 0.3;
            const d = 800;
            graph.cameraPosition({ x: d*Math.sin(angle*Math.PI/180), z: d*Math.cos(angle*Math.PI/180), y: 100 });
        }
        requestAnimationFrame(rotate);
    }

    function onInteraction() { userInteracted = true; lastInteraction = Date.now(); }

    function nodeLabel(n) {
        const txt = n.text || '';
        const label = n.clusterLabel ? '<div style="font-size:9px;color:#5a7a8a;margin-bottom:2px">' + n.clusterLabel + '</div>' : '';
        return label + '<div style="max-width:240px;font-size:11px;color:#c0d8e8">' +
               (txt.length > 100 ? txt.slice(0,100) + '...' : txt) + '</div>';
    }

    // ---- Info panel ----
    function showPanel(node) {
        onInteraction();
        const badge = document.getElementById('info-cluster');
        badge.textContent = node.clusterLabel || '';
        badge.style.background = node.color || '#7fffb2';
        document.getElementById('info-text').textContent = node.text || '';
        let meta = node.isSeed ? 'Seed prompt' : 'Visitor dream';
        if (!node.isSeed && node.submitted_at) {
            meta += ' \u2014 ' + new Date(node.submitted_at + 'Z').toLocaleString();
        }
        // Orientation explanation
        const cluster = node.clusterLabel || 'its cluster';
        let orient = '';
        if (node.mode === 'reinforce') {
            orient = 'This fish swims toward the ' + cluster + ' school \u2014 its dream reinforces what others are already dreaming about.';
        } else if (node.mode === 'bridge') {
            orient = 'This fish swims between two schools \u2014 its dream connects different currents in the collective imagination.';
        } else if (node.mode === 'frontier') {
            orient = 'This fish swims away from its nearest neighbors \u2014 its dream explores territory no one else has touched yet.';
        }
        document.getElementById('info-meta').textContent = meta;
        document.getElementById('info-orient').textContent = orient;
        infoPanel.classList.add('active');
    }
    function closePanel() { infoPanel.classList.remove('active'); }

    // ---- Legend + cluster selection ----
    let selectedCluster = null;

    function updateLegend(clusters) {
        legendItems.innerHTML = '';
        clusters.forEach(c => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.style.cursor = 'pointer';
            item.innerHTML = '<div class="legend-dot" style="background:' + c.color + '"></div>' + c.label;
            item.dataset.clusterId = c.id;
            item.addEventListener('click', () => {
                if (playing) stopPlay();
                if (selectedCluster === c.id) { clearClusterSelection(); return; }
                // Mark selected in legend
                legendItems.querySelectorAll('.legend-item').forEach(el => el.classList.remove('selected'));
                item.classList.add('selected');
                highlightCluster(c.id);
            });
            legendItems.appendChild(item);
        });
    }

    function highlightCluster(clusterId) {
        selectedCluster = clusterId;
        onInteraction();

        graphData.nodes.forEach(n => {
            if (n.cluster === clusterId) styleFish(n.id, n.color, 0.95, 1.5);
            else styleFish(n.id, n.color, 0.15, 0.5);
        });

        // Brighten links between nodes in the selected cluster
        graph.linkColor(l => {
            const [src, tgt] = linkEndIds(l);
            const srcNode = graphData.nodes.find(n => n.id === src);
            const tgtNode = graphData.nodes.find(n => n.id === tgt);
            const srcIn = srcNode && srcNode.cluster === clusterId;
            const tgtIn = tgtNode && tgtNode.cluster === clusterId;
            if (srcIn && tgtIn) {
                const t = ((tiMap[src]||0) + (tiMap[tgt]||0)) / 2;
                return spectrumColor(t, 0.5);
            }
            if (srcIn || tgtIn) {
                const t = ((tiMap[src]||0) + (tiMap[tgt]||0)) / 2;
                return spectrumColor(t, 0.15);
            }
            return spectrumColor(0.5, 0.03);
        });
        graph.linkWidth(l => {
            const [src, tgt] = linkEndIds(l);
            const srcNode = graphData.nodes.find(n => n.id === src);
            const tgtNode = graphData.nodes.find(n => n.id === tgt);
            if (srcNode?.cluster === clusterId && tgtNode?.cluster === clusterId) return 1.5;
            return 0.3;
        });
    }

    function clearClusterSelection() {
        selectedCluster = null;
        legendItems.querySelectorAll('.legend-item').forEach(el => el.classList.remove('selected'));
        if (!graph) return;
        resetAllFish();
        graph.linkColor(defaultLinkColor);
        graph.linkWidth(defaultLinkWidth);
    }

    // ---- Playback ----
    function togglePlay() { if (playing) stopPlay(); else startPlay(); }

    function startPlay() {
        playing = true;
        playBtn.textContent = 'Pause';
        playBtn.classList.add('active');
        userInteracted = true;
        sortedNodes = [...graphData.nodes].sort((a,b) => (a.submitted_at||'').localeCompare(b.submitted_at||''));
        posMap = {};
        sortedNodes.forEach((n,i) => posMap[n.id] = i);
        playIndex = 0;
        advancePlay();
    }

    function advancePlay() {
        if (!playing || playIndex >= sortedNodes.length) { stopPlay(); return; }
        const node = sortedNodes[playIndex];
        highlightTrail(node, playIndex);
        showPanel(node);
        playProgressEl.textContent = (playIndex+1) + ' / ' + sortedNodes.length;

        const camAngle = (playIndex * 15) * Math.PI / 180;
        const camDist = 500;
        graph.cameraPosition(
            { x: node.fx + camDist*Math.sin(camAngle), y: node.fy + 150, z: node.fz + camDist*Math.cos(camAngle) },
            { x: node.fx, y: node.fy, z: node.fz }, 1500
        );
        playIndex++;
        playTimer = setTimeout(advancePlay, DWELL_MS);
    }

    function highlightTrail(activeNode, currentPos) {
        graphData.nodes.forEach(n => {
            if (n.id === activeNode.id) {
                styleFish(n.id, '#ffffff', 1.0, 2.5);
            } else {
                const d = Math.abs((posMap[n.id] ?? 999) - currentPos);
                if (d <= TRAIL_NEAR) styleFish(n.id, n.color, 0.9, 1.2);
                else if (d <= TRAIL_FAR) styleFish(n.id, n.color, 0.5, 0.8);
                else styleFish(n.id, n.color, 0.25, 0.6);
            }
        });

        // Edges: trail uses timeline spectrum, brightness by proximity
        const total = sortedNodes.length;
        graph.linkColor(l => {
            const [src, tgt] = linkEndIds(l);
            const srcD = Math.abs((posMap[src] ?? 999) - currentPos);
            const tgtD = Math.abs((posMap[tgt] ?? 999) - currentPos);
            const d = Math.max(srcD, tgtD);
            const t = ((posMap[src]||0) + (posMap[tgt]||0)) / 2 / Math.max(1, total-1);

            if (d <= 1)          return spectrumColor(t, 0.80);
            if (d <= TRAIL_NEAR) return spectrumColor(t, 0.45);
            if (d <= TRAIL_FAR)  return spectrumColor(t, 0.20);
            return spectrumColor(t, 0.06);
        });
        graph.linkWidth(l => {
            const [src, tgt] = linkEndIds(l);
            const srcD = Math.abs((posMap[src] ?? 999) - currentPos);
            const tgtD = Math.abs((posMap[tgt] ?? 999) - currentPos);
            const d = Math.max(srcD, tgtD);
            if (d <= 1) return 2.5;
            if (d <= TRAIL_NEAR) return 1.5;
            if (d <= TRAIL_FAR) return 1.0;
            return 0.4;
        });
    }

    function stopPlay() {
        playing = false;
        playBtn.textContent = 'Play';
        playBtn.classList.remove('active');
        playProgressEl.textContent = '';
        clearTimeout(playTimer);
        if (graph) {
            resetAllFish();
            graph.linkColor(defaultLinkColor);
            graph.linkWidth(defaultLinkWidth);
        }
    }

    // ---- Fish mesh ----
    const fishMap = {};  // nodeId -> THREE.Group

    function createFish(node) {
        const color = new THREE.Color(node.color);
        const s = node.isSeed ? 10 : 15;

        // Fish silhouette using THREE.Shape
        const shape = new THREE.Shape();
        shape.moveTo(s * 1.0, 0);                              // nose
        shape.quadraticCurveTo(s * 0.6, s * 0.35, 0, s * 0.28);  // upper body
        shape.quadraticCurveTo(-s * 0.3, s * 0.22, -s * 0.5, s * 0.4); // upper tail
        shape.lineTo(-s * 0.35, 0);                             // tail notch
        shape.lineTo(-s * 0.5, -s * 0.4);                       // lower tail
        shape.quadraticCurveTo(-s * 0.3, -s * 0.22, 0, -s * 0.28); // lower body
        shape.quadraticCurveTo(s * 0.6, -s * 0.35, s * 1.0, 0);    // back to nose

        const geo = new THREE.ExtrudeGeometry(shape, {
            depth: s * 0.25, bevelEnabled: true,
            bevelThickness: s * 0.08, bevelSize: s * 0.06, bevelSegments: 2
        });
        geo.center();
        // Rotate so fish faces +Z (forward)
        geo.rotateY(Math.PI / 2);

        // Subtle visual cue per orientation mode
        const opacity = node.mode === 'frontier' ? 0.7 : 0.9;
        const emissive = node.mode === 'bridge' ? color.clone().multiplyScalar(0.3) : new THREE.Color(0);
        const mat = new THREE.MeshLambertMaterial({
            color: color, emissive: emissive,
            transparent: true, opacity: opacity
        });
        const mesh = new THREE.Mesh(geo, mat);

        const group = new THREE.Group();
        group.add(mesh);

        // Orient fish along direction vector
        const dir = node.dir || [0, 0, 1];
        const target = new THREE.Vector3(dir[0], dir[1], dir[2]);
        if (target.lengthSq() > 0.001) {
            // lookAt from origin toward the direction
            const m = new THREE.Matrix4();
            m.lookAt(new THREE.Vector3(0,0,0), target, new THREE.Vector3(0,1,0));
            group.quaternion.setFromRotationMatrix(m);
        }

        fishMap[node.id] = group;
        return group;
    }

    function styleFish(nodeId, color, opacity, scale) {
        const fish = fishMap[nodeId];
        if (!fish) return;
        fish.children.forEach(mesh => {
            mesh.material.color.set(color);
            mesh.material.opacity = opacity;
        });
        fish.scale.setScalar(scale);
    }

    function resetAllFish() {
        graphData.nodes.forEach(n => styleFish(n.id, n.color, 0.9, 1.0));
    }

    // ---- Data ----
    async function fetchData() {
        try { const r = await fetch('/dreams/3d'); return r.ok ? await r.json() : null; }
        catch(e) { return null; }
    }
    function fixPositions(data) { data.nodes.forEach(n => { n.fx=n.x; n.fy=n.y; n.fz=n.z; }); }

    // ---- Init ----
    async function init() {
        const data = await fetchData();
        if (!data || data.total === 0) { setTimeout(init, 3000); return; }

        graphData = data;
        fixPositions(graphData);
        buildTimelineMap();
        dreamCountEl.textContent = graphData.total;
        updateLegend(graphData.clusters || []);

        graph = ForceGraph3D()(container)
            .graphData(graphData)
            .nodeThreeObject(createFish)
            .nodeLabel(nodeLabel)
            .linkColor(defaultLinkColor)
            .linkWidth(defaultLinkWidth)
            .linkDirectionalParticles(0)
            .backgroundColor('#050a12')
            .showNavInfo(false)
            .warmupTicks(0).cooldownTicks(0)
            .onNodeClick(node => { if (playing) stopPlay(); if (selectedCluster !== null) clearClusterSelection(); showPanel(node); })
            .enableNodeDrag(false);

        container.addEventListener('mousedown', onInteraction);
        container.addEventListener('touchstart', onInteraction);
        container.addEventListener('wheel', onInteraction);
        loadingEl.classList.add('hidden');
        rotate();

        setInterval(async () => {
            if (playing) return;
            const fresh = await fetchData();
            if (!fresh || fresh.total === graphData.total) return;
            graphData = fresh;
            fixPositions(graphData);
            buildTimelineMap();
            graph.graphData(graphData);
            dreamCountEl.textContent = graphData.total;
            updateLegend(graphData.clusters || []);
        }, 15000);
    }

    window._dw = { togglePlay, closePanel };
    init();
})();
</script>
</body>
</html>
